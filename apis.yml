  - url: openapi/withpersona-openapi.yml
    type: OpenAPI
  description: Documents are files collected during verification. Retrieve a Document,
    a government-ID document, or a generic uploaded document by ID.
- aid: withpersona:persona-webhooks-api
  name: Persona Webhooks API
  tags:
  - Webhooks
  - Events
  - Notifications
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.withpersona.com/api-reference/webhooks
  baseURL: https://api.withpersona.com/api/v1
  properties:
  - url: https://docs.withpersona.com/api-reference/webhooks
    type: Documentation
  - url: openapi/withpersona-openapi.yml
    type: OpenAPI
  description: Manage webhook subscriptions that deliver Persona events to your endpoints.
    Create, retrieve, list, update, enable, disable, archive, clone, and rotate the
    signing secret of a Webhook.
- aid: withpersona:persona-events-api
  name: Persona Events API
  tags:
  - Events
  - Audit
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.withpersona.com/api-reference/events
  baseURL: https://api.withpersona.com/api/v1
  properties:
  - url: https://docs.withpersona.com/api-reference/events
    type: Documentation
  - url: openapi/withpersona-openapi.yml
    type: OpenAPI
  description: Events are the immutable, queryable record of everything that happens
    in your Persona account. List and retrieve Events for audit and reconciliation
    with webhook payloads.
- aid: withpersona:persona-importers-api
  name: Persona Importers API
  tags:
  - Importer
  - Lists
  - Bulk Import
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.withpersona.com/api-reference/importers
  baseURL: https://api.withpersona.com/api/v1
  properties:
  - url: https://docs.withpersona.com/api-reference/importers
