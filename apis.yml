aid: withpersona
url: https://raw.githubusercontent.com/api-evangelist/withpersona/refs/heads/main/apis.yml
name: Persona
kind: company
description: Persona (withpersona.com) is a configurable identity platform for KYC,
  KYB, AML, and fraud prevention. Its JSON:API-style REST API lets organizations run
  identity Inquiries, collect Verifications (government ID, selfie, database, document,
  phone, and email), pull watchlist and adverse-media Reports, manage review Cases,
  score Transactions, and orchestrate Workflows, all under api.withpersona.com/api/v1.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Identity
- Identity Verification
- KYC
- KYB
- AML
- Fraud
- Compliance
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
apis:
- aid: withpersona:persona-inquiries-api
  name: Persona Inquiries API
  tags:
  - Inquiries
  - Identity Verification
  - Onboarding
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.withpersona.com/api-reference/inquiries
  baseURL: https://api.withpersona.com/api/v1
  properties:
  - url: https://docs.withpersona.com/api-reference/inquiries
    type: Documentation
  - url: https://docs.withpersona.com/api-reference/inquiries
    type: APIReference
  - url: openapi/withpersona-openapi.yml
    type: OpenAPI
  - url: collections/withpersona.postman_collection.json
    type: PostmanCollection
  - url: collections/withpersona.opencollection.json
    type: OpenCollection
  description: An Inquiry represents a single instance of an individual attempting
    to verify their identity against a template. Create, retrieve, list, search,
    update, approve, decline, mark-for-review, expire, resume, redact, tag, print
    to PDF, and generate one-time links for Inquiries.
- aid: withpersona:persona-inquiry-sessions-api
  name: Persona Inquiry Sessions API
  tags:
  - Inquiry Sessions
  - Sessions
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.withpersona.com/api-reference/inquiry-sessions
  baseURL: https://api.withpersona.com/api/v1
  properties:
  - url: https://docs.withpersona.com/api-reference/inquiry-sessions
    type: Documentation
  - url: openapi/withpersona-openapi.yml
    type: OpenAPI
  description: Inquiry Sessions represent an individual session within an Inquiry,
    letting you create, list, retrieve, expire, and generate one-time links so a
    person can resume a verification flow on another device.
- aid: withpersona:persona-accounts-api
  name: Persona Accounts API
  tags:
  - Accounts
  - Identity
  - Records
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.withpersona.com/api-reference/accounts
  baseURL: https://api.withpersona.com/api/v1
  properties:
  - url: https://docs.withpersona.com/api-reference/accounts
    type: Documentation
  - url: openapi/withpersona-openapi.yml
    type: OpenAPI
  description: An Account is the persistent record of an end user across Inquiries.
    Create, retrieve, list, search, update, consolidate, redact, tag, and manage
    relations between Accounts, and run configured account actions.
- aid: withpersona:persona-verifications-api
  name: Persona Verifications API
  tags:
  - Verifications
  - Government ID
  - Selfie
  - Database
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.withpersona.com/api-reference/verifications
  baseURL: https://api.withpersona.com/api/v1
  properties:
  - url: https://docs.withpersona.com/api-reference/verifications
    type: Documentation
  - url: openapi/withpersona-openapi.yml
    type: OpenAPI
  description: A Verification answers whether an individual is who they claim to be
    across many types - government ID, government ID NFC, selfie, document, phone
    number, email address, and database checks (AAMVA, eCBSV, TIN, phone carrier,
    business, standard). Retrieve, redact, and print Verifications to PDF.
- aid: withpersona:persona-reports-api
  name: Persona Reports API
  tags:
  - Reports
  - Watchlist
  - Adverse Media
  - AML
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.withpersona.com/api-reference/reports
  baseURL: https://api.withpersona.com/api/v1
  properties:
  - url: https://docs.withpersona.com/api-reference/reports
    type: Documentation
  - url: openapi/withpersona-openapi.yml
    type: OpenAPI
  description: Reports run watchlist, adverse-media, PEP, and business lookups against
    an individual or entity. Create, retrieve, list, redact, tag, dismiss matches,
    pause/resume continuous monitoring, re-run, list history, and print to PDF.
- aid: withpersona:persona-cases-api
  name: Persona Cases API
  tags:
  - Cases
  - Case Management
  - Manual Review
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.withpersona.com/api-reference/cases
  baseURL: https://api.withpersona.com/api/v1
  properties:
  - url: https://docs.withpersona.com/api-reference/cases
    type: Documentation
  - url: openapi/withpersona-openapi.yml
    type: OpenAPI
  description: Cases group Persona objects (Inquiries, Accounts, Reports) for manual
    review. Create, retrieve, list, search, update, assign, set status, add or remove
    objects, tag, and redact Cases.
- aid: withpersona:persona-transactions-api
  name: Persona Transactions API
  tags:
  - Transactions
  - Risk
  - Fraud
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.withpersona.com/api-reference/transactions
  baseURL: https://api.withpersona.com/api/v1
  properties:
  - url: https://docs.withpersona.com/api-reference/transactions
    type: Documentation
  - url: openapi/withpersona-openapi.yml
    type: OpenAPI
  description: Transactions represent risk-scored events tied to an Account for ongoing
    fraud monitoring. Create, retrieve, list, update, tag, label, manage relations,
    redact, and redact transaction biometrics.
- aid: withpersona:persona-devices-api
