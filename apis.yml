  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.withpersona.com/api-reference/devices
  baseURL: https://api.withpersona.com/api/v1
  properties:
  - url: https://docs.withpersona.com/api-reference/devices
    type: Documentation
  - url: openapi/withpersona-openapi.yml
    type: OpenAPI
  description: Devices capture device-intelligence signals observed during a flow.
    List and retrieve Device records collected across Inquiries and Transactions.
- aid: withpersona:persona-documents-api
  name: Persona Documents API
  tags:
  - Documents
  - Files
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.withpersona.com/api-reference/documents
  baseURL: https://api.withpersona.com/api/v1
